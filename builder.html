<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>baboAI — 앱 만들기</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
:root{--ac:#6366f1;--ac2:#4f46e5;--bg:#f0f2ff;--card:#fff;--txt:#1e1e2e;--sub:#6b7280;--bdr:#e5e7eb;--r:14px;--sh:0 2px 20px rgba(99,102,241,.1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;padding:36px 16px 80px;color:var(--txt)}
.wrap{max-width:580px;margin:0 auto}
.header{text-align:center;margin-bottom:32px}
.logo{font-size:28px;font-weight:900;color:var(--ac);letter-spacing:-1px}
.logo a{color:inherit;text-decoration:none}
.tagline{color:var(--sub);font-size:13px;margin-top:6px}
.steps{display:flex;justify-content:center;align-items:center;gap:6px;margin-bottom:28px;flex-wrap:wrap}
.si{padding:7px 16px;border-radius:999px;font-size:13px;color:var(--sub);background:var(--card);border:1.5px solid var(--bdr);transition:all .2s;white-space:nowrap}
.si.active{background:var(--ac);color:#fff;border-color:var(--ac);font-weight:700}
.si.done{border-color:var(--ac);color:var(--ac);cursor:pointer}
.si.done:hover{background:#ede9fe}
.arrow{color:var(--bdr);font-size:14px}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:28px;margin-bottom:16px}
section{display:none}
section.on{display:block}
.sec-title{font-size:16px;font-weight:700;margin-bottom:6px}
.sec-desc{font-size:13px;color:var(--sub);margin-bottom:20px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--sub);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.field input{width:100%;border:1.5px solid var(--bdr);border-radius:8px;padding:10px 14px;font-size:15px;color:var(--txt);background:#fff;outline:none;font-family:inherit;transition:border-color .15s}
.field input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.field input::placeholder{color:#d1d5db}
.field input.err{border-color:#dc2626}
.thumb-zone{width:100px;height:100px;border:2px dashed #c7d2fe;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;font-size:11px;font-weight:600;color:#a5b4fc;text-align:center;gap:4px;background:#f5f3ff;transition:border-color .15s}
.thumb-zone:hover{border-color:var(--ac)}
.thumb-zone img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;display:none}
.thumb-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.btn-primary{display:block;width:100%;padding:14px;background:var(--ac);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;margin-top:8px}
.btn-primary:hover{background:var(--ac2)}
.btn-primary:disabled{background:#c7d2fe;cursor:default}
.status{font-size:13px;color:var(--sub);margin-top:10px;min-height:18px}
.status.ok{color:#059669;font-weight:600}
.status.err{color:#dc2626}
.class-cards-wrap{display:flex;flex-direction:column;gap:12px;margin-bottom:8px}
.class-card{background:#fafbff;border:1.5px solid var(--bdr);border-radius:10px;padding:16px}
.cls-badge{display:inline-block;background:#ede9fe;color:var(--ac);font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.cls-row{display:flex;gap:14px;align-items:flex-start}
.cls-img-box{width:80px;height:80px;flex-shrink:0;border:2px dashed #c7d2fe;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;font-size:10px;font-weight:600;color:#a5b4fc;text-align:center;gap:4px;background:#f5f3ff;transition:border-color .15s}
.cls-img-box:hover{border-color:var(--ac)}
.cls-img-box img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;display:none}
.cls-img-box input{position:absolute;inset:0;opacity:0;cursor:pointer}
.cls-fields{flex:1;display:flex;flex-direction:column;gap:8px}
.cls-fields input{border:1.5px solid var(--bdr);border-radius:8px;padding:8px 12px;font-size:14px;color:var(--txt);background:#fff;outline:none;width:100%;font-family:inherit;transition:border-color .15s}
.cls-fields input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.cls-fields input::placeholder{color:#d1d5db;font-size:13px}
</style>
</head>
<body>
<div class="wrap">

<div class="header">
  <div class="logo"><a href="index.html">baboAI</a></div>
  <p class="tagline">AI 분류 앱 만들기</p>
</div>

<div class="steps">
  <div class="si active" id="si-1">① 모델 불러오기</div>
  <span class="arrow">›</span>
  <div class="si" id="si-2">② 앱 편집</div>
  <span class="arrow">›</span>
  <div class="si" id="si-3">③ 게시하기</div>
</div>

<!-- Step 1 -->
<section id="step1" class="on">
  <div class="card">
    <p class="sec-title">티쳐블 머신 모델 URL 입력</p>
    <p class="sec-desc">티쳐블 머신에서 모델 학습 후 <strong>모델 업로드</strong>를 눌러 받은 공유 URL을 붙여넣으세요.</p>
    <div class="field">
      <label>공유 URL</label>
      <input type="url" id="tm-url" placeholder="https://teachablemachine.withgoogle.com/models/xxxxxxxx/">
    </div>
    <button class="btn-primary" id="load-btn" onclick="loadModel()">🚀 모델 불러오기</button>
    <div class="status" id="load-status"></div>
  </div>
</section>

<!-- Step 2 -->
<section id="step2">
  <div class="card" style="margin-bottom:12px">
    <p class="sec-title">앱 기본 정보</p>
    <p class="sec-desc">갤러리 카드와 앱 첫 화면에 표시됩니다.</p>
    <div class="field">
      <label>앱 제목 *</label>
      <input type="text" id="app-title" placeholder="예: 강아지 vs 고양이 분류기">
    </div>
    <div class="field">
      <label>소개 문구</label>
      <input type="text" id="app-intro" placeholder="예: 사진을 찍으면 강아지인지 고양이인지 알려줘요!">
    </div>
    <div class="field">
      <label>썸네일 이미지</label>
      <div class="thumb-zone" id="thumb-zone">
        <input type="file" id="thumb-file" accept="image/*">
        <img id="thumb-preview" alt="">
        <span id="thumb-placeholder">이미지<br>추가</span>
      </div>
    </div>
  </div>
  <div class="card">
    <p class="sec-title">클래스별 결과 편집</p>
    <p class="sec-desc">각 분류 결과에 보여줄 이미지와 텍스트를 입력하세요.</p>
    <div class="class-cards-wrap" id="class-cards"></div>
  </div>
  <button class="btn-primary" onclick="goToPublish()">다음 →</button>
</section>

<!-- Step 3 -->
<section id="step3">
  <div class="card">
    <p class="sec-title">갤러리에 게시하기</p>
    <p class="sec-desc">작성자 이름을 입력하고 게시하면 baboAI 갤러리에 공개됩니다.</p>
    <div class="field">
      <label>작성자 이름 *</label>
      <input type="text" id="pub-author" placeholder="예: 김철수">
    </div>
    <button class="btn-primary" id="pub-btn" onclick="publishApp()">🌐 갤러리에 게시하기</button>
    <div class="status" id="pub-status"></div>
  </div>
</section>

</div>
<script>
let model = null;
let modelUrl = '';
let appThumbnailData = null;
const templates = {};

document.getElementById('si-1').addEventListener('click', () => {
  if (document.getElementById('si-1').classList.contains('done')) goStep(1);
});
document.getElementById('si-2').addEventListener('click', () => {
  if (document.getElementById('si-2').classList.contains('done')) goStep(2);
});

document.getElementById('thumb-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    appThumbnailData = ev.target.result;
    const img = document.getElementById('thumb-preview');
    img.src = ev.target.result;
    img.style.display = 'block';
    document.getElementById('thumb-placeholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
});

async function loadModel() {
  const btn = document.getElementById('load-btn');
  const status = document.getElementById('load-status');
  btn.disabled = true;
  status.className = 'status';
  status.textContent = '불러오는 중...';
  try {
    const urlVal = document.getElementById('tm-url').value.trim();
    if (!urlVal) throw new Error('URL을 입력하세요.');
    modelUrl = urlVal.endsWith('/') ? urlVal : urlVal + '/';
    model = await tmImage.load(modelUrl + 'model.json', modelUrl + 'metadata.json');
    const classes = model.getClassLabels();
    classes.forEach(c => { templates[c] = { title: '', desc: '', imageData: null }; });
    buildClassCards(classes);
    goStep(2);
    status.textContent = `✓ 모델 로드 완료 (${classes.length}개 클래스)`;
  } catch(e) {
    status.className = 'status err';
    status.textContent = '오류: ' + e.message;
    btn.disabled = false;
  }
}

function buildClassCards(classes) {
  const container = document.getElementById('class-cards');
  container.innerHTML = '';
  classes.forEach(cls => {
    const card = document.createElement('div');
    card.className = 'class-card';

    const badge = document.createElement('div');
    badge.className = 'cls-badge';
    badge.textContent = cls;

    const row = document.createElement('div');
    row.className = 'cls-row';

    const imgBox = document.createElement('div');
    imgBox.className = 'cls-img-box';
    const imgEl = document.createElement('img');
    imgEl.alt = '';
    const placeholder = document.createElement('span');
    placeholder.textContent = '이미지\n추가';
    placeholder.style.whiteSpace = 'pre';
    const imgInput = document.createElement('input');
    imgInput.type = 'file';
    imgInput.accept = 'image/*';
    imgInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        templates[cls].imageData = ev.target.result;
        imgEl.src = ev.target.result;
        imgEl.style.display = 'block';
        placeholder.style.display = 'none';
      };
      reader.readAsDataURL(file);
    });
    imgBox.appendChild(placeholder);
    imgBox.appendChild(imgEl);
    imgBox.appendChild(imgInput);

    const fields = document.createElement('div');
    fields.className = 'cls-fields';
    const titleInput = document.createElement('input');
    titleInput.type = 'text';
    titleInput.placeholder = '결과 제목 (예: 고양이형)';
    titleInput.addEventListener('input', () => { templates[cls].title = titleInput.value; });
    const descInput = document.createElement('input');
    descInput.type = 'text';
    descInput.placeholder = '결과 설명 (선택)';
    descInput.addEventListener('input', () => { templates[cls].desc = descInput.value; });
    fields.appendChild(titleInput);
    fields.appendChild(descInput);

    row.appendChild(imgBox);
    row.appendChild(fields);
    card.appendChild(badge);
    card.appendChild(row);
    container.appendChild(card);
  });
}

function goStep(n) {
  ['step1','step2','step3'].forEach((id, i) => {
    document.getElementById(id).classList.toggle('on', i + 1 === n);
  });
  [1,2,3].forEach(i => {
    const el = document.getElementById('si-' + i);
    el.classList.remove('active','done');
    if (i < n) el.classList.add('done');
    else if (i === n) el.classList.add('active');
  });
  if (n === 1) {
    document.getElementById('load-btn').disabled = false;
    document.getElementById('load-status').textContent = '';
    document.getElementById('load-status').className = 'status';
  }
  window.scrollTo(0, 0);
}

function goToPublish() {
  const titleEl = document.getElementById('app-title');
  if (!titleEl.value.trim()) {
    titleEl.classList.add('err');
    titleEl.focus();
    setTimeout(() => titleEl.classList.remove('err'), 2000);
    return;
  }
  goStep(3);
}

function compressImage(dataUrl, maxSize) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const ratio = Math.min(maxSize / img.width, maxSize / img.height, 1);
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * ratio);
      canvas.height = Math.round(img.height * ratio);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', 0.7));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

async function publishApp() {
  const btn = document.getElementById('pub-btn');
  const status = document.getElementById('pub-status');
  const author = document.getElementById('pub-author').value.trim();
  if (!author) {
    document.getElementById('pub-author').focus();
    return;
  }
  btn.disabled = true;
  status.className = 'status';
  status.textContent = '게시하는 중...';
  try {
    const thumbnail = appThumbnailData ? await compressImage(appThumbnailData, 400) : null;
    const compressedTemplates = {};
    for (const [cls, tmpl] of Object.entries(templates)) {
      compressedTemplates[cls] = {
        title: tmpl.title,
        desc: tmpl.desc,
        imageData: tmpl.imageData ? await compressImage(tmpl.imageData, 300) : null
      };
    }
    await db.collection('apps').add({
      appTitle: document.getElementById('app-title').value.trim(),
      intro: document.getElementById('app-intro').value.trim(),
      author,
      thumbnail,
      modelUrl,
      classCount: Object.keys(templates).length,
      templates: compressedTemplates,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    status.className = 'status ok';
    status.textContent = '✓ 게시 완료! 갤러리로 이동합니다...';
    setTimeout(() => { window.location.href = 'index.html'; }, 1200);
  } catch(e) {
    status.className = 'status err';
    status.textContent = '오류: ' + e.message;
    btn.disabled = false;
  }
}
</script>
</body>
</html>
